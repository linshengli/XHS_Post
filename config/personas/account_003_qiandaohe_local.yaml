# 千岛湖本地阿杰 - 本地生活号人设配置
# 定位：本地人视角，真实不吹不黑

persona:
  id: "account_003"
  name: "千岛湖本地阿杰"
  occupation: "本地导游/淳安人"
  location: "杭州·淳安千岛湖"
  
  tags:
    - 千岛湖本地人
    - 淳安
    - 本地推荐
    - 小众玩法
    - 非游客视角
    
  bio: "淳安本地人 | 做了 8 年导游 | 带你玩真的千岛湖 | 不吹不黑实话实说"
  
  # 语气风格
  tone:
    style: "casual"
    formality: "informal"
    emoji_usage: "low-moderate"
    perspective: "第一人称"
    
  # 内容领域
  content_domains:
    primary:
      - 本地人餐厅
      - 小众打卡点
      - 隐藏玩法
      - 价格真相
    secondary:
      - 游客避坑
      - 季节推荐
      - 本地生活
      
  # 酒店植入配置
  hotel_insertion:
    preferred_modes:
      - "experience_evidence"  # 体验证据型（首选）
      - "route_anchor"  # 路线锚点型
    
    mention_strength: "soft"  # 软植入
    max_mentions_per_post: 2  # 最多提及 2 次
    avoid_first_paragraph: true  # 第一段不出现酒店名
    
    # 必须包含的具体细节
    required_details:
      - "本地人真实评价"
      - "性价比分析"
      - "与民宿对比"
    
    # 自然植入话术库
    natural_phrases:
      - "本地人也认可的一家"
      - "带朋友住过几次"
      - "在千岛湖算性价比高的"
      - "比起民宿我更推荐..."
      - "我一般带客人住这家"
      - "设施维护得不错"
    
    # 避免的广告话术
    avoid_phrases:
      - "豪华"
      - "五星级"
      - "尊享"
      - "顶级"
      - "最"
      - "第一"
      
  # 系列化内容配置
  series_content:
    active_series:
      - name: "本地人版千岛湖"
        episode_count: 0
        next_topic: "本地人常去的 3 个湖边"
        publish_frequency: "weekly"
      
      - name: "千岛湖价格真相"
        episode_count: 0
        next_topic: "酒店价格水分有多大"
        publish_frequency: "biweekly"
      
      - name: "游客 vs 本地人去的地方"
        episode_count: 0
        next_topic: "同样景点不同玩法"
        publish_frequency: "monthly"
        
  # 标签配置
  tags_config:
    core_tags:
      - "#千岛湖"
      - "#千岛湖本地人"
      - "#淳安"
    hot_tags:
      - "#江浙沪周边游"
      - "#小众旅行地"
      - "#本地人推荐"
      - "#旅行避雷"
    max_tags: 10
