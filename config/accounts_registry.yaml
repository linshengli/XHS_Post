  # 全局配置
  global_settings:
    # 跨账号差异化要求
    differentiation:
      min_title_similarity: 0.3  # 标题相似度阈值
      min_content_similarity: 0.4  # 内容相似度阈值
      require_different_angles: true  # 必须使用不同角度
      
    # 内容分发策略
    distribution:
      strategy: "staggered"  # staggered (错峰), simultaneous (同时)
      time_gap_hours: 2  # 错峰时间间隔
      avoid_duplicate_topics_days: 7  # 避免相同主题的天数
      
    # 酒店植入控制
    hotel_insertion_control:
      # 4 个账号合计的内容配比
      total_ratio:
        pure_useful: 0.40  # 40% 纯有用内容
        scene_seeding: 0.30  # 30% 场景种草
        soft_insertion: 0.20  # 20% 软植入
        hard_conversion: 0.10  # 10% 硬转化
      
      # 广告感风险控制
      risk_control:
        max_advertisement_score: 6  # 广告感评分上限 (1-10)
        require_real_details: true  # 必须有真实细节
        avoid_absolute_words: true  # 避免绝对化用语
      
    # LLM 配置
    llm:
      provider: "qwen"
      model: "qwen3.5-plus"
      temperature: 0.7
      max_tokens: 2000
      
    # 系列化追踪
    series_tracking:
      enabled: true
      tracker_file: "config/series_tracker.json"
      
    # Telegram 推送配置
    telegram:
      enabled: true
      dry_run: true
      channel_id: "@qiandaohe_hotel_auto"
